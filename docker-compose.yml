services:
  postgres:
    image: postgres:15
    container_name: coupon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coupons
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./backend/db/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql
  backend:
    build: ./backend
    container_name: coupon-backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/coupons?sslmode=disable
      RESELLER_TOKEN: super-secret-reseller-token
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"

volumes:
  postgres_data: